<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Filtro Tipo - Pokedex</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f4f8; padding: 20px; }
        h1 { color: #0096d6; }
        a { color: #0096d6; text-decoration: none; }
        table { width: 100%; border-collapse: collapse; background-color: white; }
        th { background-color: #0096d6; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
        tr:hover { background-color: #e6f4fb; }
    </style>
</head>
<body>
    <a href="/" style="
        border: 2px solid #0096d6;
        color: #0096d6;
        background-color: white;
        padding: 8px 15px;
        border-radius: 5px;
        text-decoration: none;
        display: inline-block;
        margin-bottom: 20px;
        transition: all 0.2s;
    "
    onmouseover="this.style.backgroundColor='#0096d6'; this.style.color='white';"
    onmouseout="this.style.backgroundColor='white'; this.style.color='#0096d6';">
        ← Volver al inicio
</a>
    <h1>Pokemones tipo Grass</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Tipos</th>
                <th>Altura</th>
                <th>Peso</th>
            </tr>
        </thead>
       <tbody>
            {% for pokemon in pokemon_list %}
            <tr class="pokemon-row" data-tipos="{{ pokemon.tipos }}">
                <td>{{ pokemon.pokemon_id }}</td>
                <td>{{ pokemon.nombre }}</td>
                <td>{{ pokemon.tipos }}</td>
                <td>{{ pokemon.altura }}</td>
                <td>{{ pokemon.peso }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <script>
    const colores = {
        grass: '#ccf0d4',
    };

    document.querySelectorAll('.pokemon-row').forEach(row => {
        const tipos = row.dataset.tipos.split(', ');
        const color = colores[tipos[0]] || '#f5f5f5';
        
        row.addEventListener('mouseover', () => {
            row.style.backgroundColor = color;
        });
        row.addEventListener('mouseout', () => {
            row.style.backgroundColor = '';
        });
    });
    document.querySelectorAll('th').forEach((th, index) => {
        th.style.cursor = 'pointer';
        let asc = true;
        
        th.addEventListener('click', () => {
            const tabla = th.closest('table');
            const filas = Array.from(tabla.querySelectorAll('tbody tr'));
            
            filas.sort((a, b) => {
                const valA = a.cells[index].innerText.trim();
                const valB = b.cells[index].innerText.trim();
                
                const numA = parseFloat(valA);
                const numB = parseFloat(valB);
                
                if (!isNaN(numA) && !isNaN(numB)) {
                    return asc ? numA - numB : numB - numA;
                }
                return asc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            });
            
            filas.forEach(fila => tabla.querySelector('tbody').appendChild(fila));
            asc = !asc;
        });
    });
    </script>
</body>
</html>
