<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pokedex</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            padding: 20px;
        }
        h1 {
            color: #0096d6;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }
        th {
            background-color: #0096d6;
            color: white;
            padding: 10px;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        tr:hover {
            background-color: #e6f4fb;
        }
</style>
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1 style="color: #0096d6;">Pokedex</h1>
        <h1 style="color: #0096d6;">Laboratorio del Profesor Oak</h1>
    </div>

    <div style="margin-bottom: 20px;">
        <a href="/filtro-peso/" style="background-color: #0096d6; color: white; padding: 10px 15px; margin-right: 10px; border-radius: 5px; text-decoration: none;">Filtro Peso</a>
        <a href="/filtro-tipo/" style="background-color: #0096d6; color: white; padding: 10px 15px; margin-right: 10px; border-radius: 5px; text-decoration: none;">Filtro Tipo Grass</a>
        <a href="/filtro-combinado/" style="background-color: #0096d6; color: white; padding: 10px 15px; margin-right: 10px; border-radius: 5px; text-decoration: none;">Filtro Flying y Altura</a>
        <a href="/transformacion/" style="background-color: #0096d6; color: white; padding: 10px 15px; border-radius: 5px; text-decoration: none;">Nombres Invertidos</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Imagen</th>
                <th>ID</th>
                <th>Nombre</th>
                <th>Tipos</th>
                <th>Altura</th>
                <th>Peso</th>
            </tr>
        </thead>
        <tbody>
            {% for pokemon in pokemon_list %}
            <tr class="pokemon-row" data-tipos="{{ pokemon.tipos }}">
                <td><img src="{{ pokemon.imagen }}" width="60"></td>
                <td>{{ pokemon.pokemon_id }}</td>
                <td>{{ pokemon.nombre }}</td>
                <td>{{ pokemon.tipos }}</td>
                <td>{{ pokemon.altura }}</td>
                <td>{{ pokemon.peso }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <script>
    const colores = {
        fire: '#ffe0cc',
        water: '#cce5ff',
        grass: '#ccf0d4',
        poison: '#eeccff',
        flying: '#ddeeff',
        bug: '#e6ffcc',
        normal: '#f0f0f0',
        electric: '#fff9cc',
        ground: '#f5e6cc',
        fairy: '#ffe6f0',
        fighting: '#ffcccc',
        psychic: '#ffcce6',
        rock: '#e6dcc8',
        ice: '#ccf5ff',
        ghost: '#d9ccff',
        dragon: '#ccd4ff',
        dark: '#d4cccc',
        steel: '#dde6ee',
    };

    document.querySelectorAll('.pokemon-row').forEach(row => {
        const tipos = row.dataset.tipos.split(', ');
        const color = colores[tipos[0]] || '#f5f5f5';
        
        row.addEventListener('mouseover', () => {
            row.style.backgroundColor = color;
        });
        row.addEventListener('mouseout', () => {
            row.style.backgroundColor = '';
        });
    });

    document.querySelectorAll('th').forEach((th, index) => {
        th.style.cursor = 'pointer';
        let asc = true;
        
        th.addEventListener('click', () => {
            const tabla = th.closest('table');
            const filas = Array.from(tabla.querySelectorAll('tbody tr'));
            
            filas.sort((a, b) => {
                const valA = a.cells[index].innerText.trim();
                const valB = b.cells[index].innerText.trim();
                
                const numA = parseFloat(valA);
                const numB = parseFloat(valB);
                
                if (!isNaN(numA) && !isNaN(numB)) {
                    return asc ? numA - numB : numB - numA;
                }
                return asc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            });
            
            filas.forEach(fila => tabla.querySelector('tbody').appendChild(fila));
            asc = !asc;
        });
    });
    </script>
</body>
</html>
